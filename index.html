<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>MECG — Michigan Engineering Consulting Group</title>
    <meta
      name="description"
      content="Michigan Engineering Consulting Group (MECG): pro-bono consulting open to all majors at the University of Michigan. Apply, alumni network, and member resources."
    />
    <meta name="theme-color" content="#111111" />
    <!-- next-themes storageKey must match THEME_STORAGE_KEY in src/lib/theme-constants.ts -->
    <script>
      (() => {
        var k, t, d;
        try {
          k = "mecg-theme";
          t = localStorage.getItem(k);
          d = document.documentElement;
          if (t === "light") {
            d.classList.add("light");
            d.style.colorScheme = "light";
          } else if (t === "dark") {
            d.classList.add("dark");
            d.style.colorScheme = "dark";
          }
        } catch (_e) {}
      })();
    </script>
    <link rel="canonical" href="__SITE_URL__/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MECG — Michigan Engineering Consulting Group" />
    <meta
      property="og:description"
      content="Pro-bono consulting open to all majors at the University of Michigan. Apply, connect with alumni, and access member tools."
    />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:image" content="__SITE_URL__/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MECG — Michigan Engineering Consulting Group" />
    <meta
      name="twitter:description"
      content="Pro-bono consulting open to all majors at the University of Michigan."
    />
    <meta name="twitter:image" content="__SITE_URL__/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
